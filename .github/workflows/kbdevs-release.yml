name: kbdevs-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example kbdevs-v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "kbdevs-*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install active toolchain target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build Codex
        run: cargo build --locked --release --target ${{ matrix.target }} --bin codex
      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/codex" dist/codex
          tar -C dist -czf "codex-${{ matrix.target }}.tar.gz" codex
      - uses: actions/upload-artifact@v4
        with:
          name: codex-${{ matrix.target }}
          path: codex-rs/codex-${{ matrix.target }}.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*.tar.gz
          make_latest: true
