name: kbdevs-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and publish, for example kbdevs-rust-v0.142.5"
        required: true
        type: string
  push:
    tags:
      - "kbdevs-*"

permissions:
  contents: write
  actions: write

concurrency:
  group: kbdevs-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.target }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO: "off"
      CARGO_PROFILE_RELEASE_STRIP: "symbols"
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      SCCACHE_CACHE_SIZE: 4G
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Capture cache keys
        id: lockhash
        shell: bash
        run: |
          set -euo pipefail
          checksum() {
            python3 -c 'import hashlib, pathlib, sys; print(hashlib.sha256(pathlib.Path(sys.argv[1]).read_bytes()).hexdigest())' "$1"
          }
          echo "lock=$(checksum Cargo.lock)" >> "$GITHUB_OUTPUT"
          echo "toolchain=$(checksum rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Restore cargo home cache
        id: cache_cargo_home_restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: kbdevs-cargo-home-${{ runner.os }}-${{ matrix.target }}-${{ steps.lockhash.outputs.lock }}-${{ steps.lockhash.outputs.toolchain }}
          restore-keys: |
            kbdevs-cargo-home-${{ runner.os }}-${{ matrix.target }}-${{ steps.lockhash.outputs.lock }}-
            kbdevs-cargo-home-${{ runner.os }}-${{ matrix.target }}-

      - name: Install sccache
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: sccache@0.7.5

      - name: Configure sccache
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ACTIONS_CACHE_URL:-}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            echo "SCCACHE_DIR=${GITHUB_WORKSPACE}/.sccache" >> "$GITHUB_ENV"
          fi
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache fallback cache
        if: env.SCCACHE_GHA_ENABLED != 'true'
        id: cache_sccache_restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/.sccache/
          key: kbdevs-sccache-${{ runner.os }}-${{ matrix.target }}-${{ steps.lockhash.outputs.lock }}-${{ github.run_id }}
          restore-keys: |
            kbdevs-sccache-${{ runner.os }}-${{ matrix.target }}-${{ steps.lockhash.outputs.lock }}-
            kbdevs-sccache-${{ runner.os }}-${{ matrix.target }}-

      - name: Configure rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: ${{ matrix.target }}

      - name: Build Codex
        run: cargo build --locked --release --timings --target ${{ matrix.target }} --bin codex

      - name: Smoke test Codex binary
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/codex"
          version="$("$binary" --version)"
          test -n "$version"
          echo "Built ${version}"

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/codex" dist/codex
          chmod 755 dist/codex
          tar -C dist -czf "codex-${{ matrix.target }}.tar.gz" codex

      - uses: actions/upload-artifact@v4
        with:
          name: codex-${{ matrix.target }}
          path: codex-rs/codex-${{ matrix.target }}.tar.gz
          if-no-files-found: error

      - name: Upload Cargo timings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-kbdevs-release-${{ matrix.target }}
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn

      - name: sccache stats
        if: always()
        continue-on-error: true
        run: sccache --show-stats || true

      - name: Save cargo home cache
        if: always() && !cancelled() && steps.cache_cargo_home_restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: kbdevs-cargo-home-${{ runner.os }}-${{ matrix.target }}-${{ steps.lockhash.outputs.lock }}-${{ steps.lockhash.outputs.toolchain }}

      - name: Save sccache fallback cache
        if: always() && !cancelled() && env.SCCACHE_GHA_ENABLED != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/.sccache/
          key: kbdevs-sccache-${{ runner.os }}-${{ matrix.target }}-${{ steps.lockhash.outputs.lock }}-${{ github.run_id }}

  release:
    name: publish release
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*.tar.gz
          make_latest: true
